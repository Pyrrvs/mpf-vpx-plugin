name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact: mpf-plugin-macos
          - os: ubuntu-latest
            artifact: mpf-plugin-linux
          - os: windows-latest
            artifact: mpf-plugin-windows

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Run tests
        run: ctest --test-dir build --output-on-failure -C Release

      - name: Package
        shell: bash
        run: |
          mkdir -p build/dist/mpf
          cp plugin.cfg build/dist/mpf/
          cp scripts/mpf_controller.vbs build/dist/mpf/
          # Post-build copy may have already placed the binary; if not, find it
          if [ ! -f build/dist/mpf/plugin-mpf* ]; then
            find build -maxdepth 2 \( -name "plugin-mpf*.dll" -o -name "plugin-mpf*.dylib" -o -name "plugin-mpf*.so" \) \
              ! -path "build/dist/*" -exec cp {} build/dist/mpf/ \;
          fi
          cd build/dist
          tar czf ${{ matrix.artifact }}.tar.gz mpf/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: build/dist/${{ matrix.artifact }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.tar.gz
          generate_release_notes: true
