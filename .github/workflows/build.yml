name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
        vpx_tag: ["v10.8.1-3788-2151290"]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure CMake
        shell: bash
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release "-DVPX_TAG=${{ matrix.vpx_tag }}"

      - name: Build
        run: cmake --build build --config Release

      - name: Run tests
        run: ctest --test-dir build --output-on-failure -C Release

      - name: Package
        shell: bash
        run: |
          mkdir -p build/dist/mpf
          cp plugin.cfg build/dist/mpf/
          cp scripts/mpf_controller.vbs build/dist/mpf/
          if [ ! -f build/dist/mpf/plugin-mpf* ]; then
            find build -maxdepth 2 \( -name "plugin-mpf*.dll" -o -name "plugin-mpf*.dylib" -o -name "plugin-mpf*.so" \) \
              ! -path "build/dist/*" -exec cp {} build/dist/mpf/ \;
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mpf-plugin-${{ matrix.os }}-${{ matrix.vpx_tag }}
          path: build/dist/mpf/
